body:
  text: 宋涼州沙門智嚴譯爾時阿難白佛言世尊一切世間必生疑惑不能解了如來等正覺以何緣故説堅信堅法乃至辟支佛耶爾時世尊告阿難言阿難當知若有衆生於先佛所造衆善行能解如來密語不生疑惑所以者何能知如來密語如幻如熱時炎如夢所見如影如響阿難若如是知密語者不生疑惑是故阿難菩薩摩訶薩於如來等正覺密語應如是知若有勤行精進不得精進勤修智慧不得智慧者不生疑惑爾時世尊欲重宣此義而説偈言諸佛導世者微密語難知為發大莊嚴無異菩薩説懈怠無智者不能解密語應當勤精進為解密語故如幻炎夢見如電亦如響以言説顯現如是等諸法如是知諸佛所説微密語能以如是慧照淨微密智不應如是知菩提可宣説應如是覺知無言説故空空不能知空空不分別空斷一切分別顯示如是空虛空無所歸亦無有取捨以無取捨故是故知法空佛告阿難若如是知有為法皆悉如夢而不放逸者不生疑惑説是法時五億比丘生堅信想者即從坐起整其衣服偏袒右肩右膝著地一心合掌皆共和合住於佛前而説偈言今日牟尼尊除我等疑心得解微密義以信求菩提復有五億比丘生堅法想者從諸比丘聞此偈已即從坐起乃至合掌住於佛前而説偈言今蒙菩提照除我等疑冥得解微密義堅法求菩提復有十億比丘生八人想者從諸比丘聞此偈已即從坐起乃至和合住於佛前而説偈言先住八地心今日皆除捨得解微密義八人求菩提復有十一億比丘生須陀洹想者從諸比丘聞此偈已即從坐起乃至和合住於佛前而説偈言今於佛法中得斷諸疑網解佛微密語宣説須陀洹復有二萬五千比丘生斯陀含想者從諸比丘聞此偈已即從坐起乃至和合住於佛前而説偈言我等本深著志樂斯陀含今皆得離著寂滅無戲論復有五百億比丘生阿那含想者從諸比丘聞此偈已即從坐起乃至和合住於佛前而説偈言今遭救世尊遠離諸戲論得菩提光照永拔諸果想復有三萬五千億得四禪比丘生阿羅漢想者從諸比丘聞此偈已即從坐起乃至和合住於佛前而説偈言我已離煩惱通達無異法知諸乘平等皆悉如幻法復有二萬比丘生聲聞想者從諸比丘聞説偈已即從坐起乃至和合住於佛前而説偈言離縛牟尼尊止我等虛説密説聲聞義我今皆通達復有五千比丘生辟支佛想者從諸比丘聞此偈已即從坐起乃至和合住於佛前而説偈言我等今現見辟支佛所行解佛微密義難思辟支佛復有一萬比丘尼生須陀洹果想斯陀含果想阿那含果想阿羅漢果想者從諸比丘聞説偈已即從坐起乃至和合住於佛前而説偈言今知平等法永斷女身分佛無有異言必成人中尊復有八萬八千優婆塞生須陀洹果想斯陀含果想阿那含果想者從諸比丘聞此偈已即從坐起乃至和合住於佛前而説偈言我等心無垢如淨毗琉璃為修佛法故今日當出家爾時虛空中有六十億那由他諸天以天曼陀羅華而散佛上散已住立而説偈言本有諸乘想亦有諸果想今日悉除捨必當成菩提爾時有百千阿羅漢舍利弗大目揵連須菩提阿泥盧頭離婆多劫賓那等即從坐起整衣服偏袒右肩右膝著地一心合掌皆共和合住於佛前而白佛言世尊我等今日志願滿足能降伏魔摧諸怨敵具足成就五無間業我等今日滿足成就五欲功德我等今日邪見具足遠離正見我等今日害多百千衆生之命我等今日已逮菩提即於今日無餘涅槃而般涅槃爾時世尊默無所説爾時會中有百千衆生皆生疑惑我等今者如在暗中云何諸大羅漢作如是語何況凡夫以疑惑故不能從此至彼從彼至此坐不能立立不能坐爾時尊者阿難知此百千衆生心之所疑亦以佛神力故問文殊師利法王子言今此大衆百千衆生聞諸大德比丘作如是語皆生疑惑世尊默然而無所説願文殊師利説其因緣此諸大德比丘以何因緣説此密語爾時文殊師利法王子語尊者阿難言阿難當知此是不退轉菩薩地事唯有不退轉菩薩乃能證知此諸大德比丘密語尊者阿難問文殊師利言此諸大德比丘皆是不退轉菩薩耶文殊師利言如是如是此諸大德比丘皆是菩薩已於菩提得不退轉阿難請文殊師利言願説諸大德比丘微密語義文殊師利言無明能生生死是故名母斷無明故名為害母父名不正思惟及以喜愛彼以永斷名為害父以諸法不可壞方便壞衆多想亦壞諸行名為壞僧應壞凡夫法名阿羅漢以不滅方便滅羅漢想名殺羅漢以不滅方便滅如來想名出佛身血如是等想已斷已害畢竟無餘阿難以是事故諸大德比丘作如是語我等今日具足成就五無間業所以者何於此法中不聚不散不減不滿是故名為五無間業滿足成就阿難當知彼作是説我等今日滿足成就五欲功德者彼諸比丘於此五欲了知如夢如幻如熱時炎如影如響彼於此智滿足成就而於五欲無增無減所以者何能知此法畢竟而無所有以無所有故能如實知而於彼法得如是忍故名滿足成就五欲功德阿難以是事故彼諸比丘作如是説我等今日滿足成就五欲功德阿難當知彼作是説我等今日滿足成就邪見遠離正見者彼諸比丘知諸法邪見諸法邪阿難邪名有為諸法皆是虛妄此虛妄法猶若虛空不增不減亦不住方亦無所屬所以者何離自性故彼知是法皆悉平等以平等故正見亦等彼已遠離如是等想所以者何若有等想有不等想彼諸比丘無有等想及不等想所以者何諸佛之法離一切想彼於佛法通達無生不得無生法是故阿難彼諸大德比丘作如是語我等今日具足成就邪見遠離正見阿難當知彼作是説我等今日害多百千衆生命者阿難彼諸比丘令此時會百千衆生諸天及人知有為法皆悉如幻如影如響知此法故離衆生想離壽想人想離一切法想以一切法不可種方便種菩提善根諸比丘比丘尼優婆塞優婆夷從諸比丘聞此密語亦得離衆生想壽想人想不數數死所以者何若著衆生想壽想人想則數數死彼已遠離如是法故畢竟不生是故阿難彼諸比丘作如是説我等今日害多百千衆生命根阿難當知彼作是説我等今日已逮菩提於無餘涅槃而般涅槃者阿難彼諸比丘令此大衆百千萬億那由他諸天及人即於今日得離煩惱得逮菩提所以者何此諸大衆皆發阿耨多羅三藐三菩提心而於今日聞説金剛句法皆得無生法忍得見菩提以是事故而作是説我等今日逮得菩提我等今日於無餘涅槃而般涅槃者彼不斷煩惱不修佛法無餘煩惱是故阿難彼諸比丘作如是説我等今日已逮菩提於無餘涅槃界而般涅槃言今日者阿難當知即於此日不生亦無所生故名今日天竺正音不生與今日音同也是故阿難求菩薩乘若善男子善女人發阿耨多羅三藐三菩提心者於一切法應當漸損以不可得法發菩提心於一切法是名為出離菩提想於一切法是名為入無餘涅槃而般涅槃阿難求菩薩乘族姓子不應深著日想不應以日而生晝想阿難愚小之人以日為晝想無黠慧故所以者何若令此晝是真實是堅牢是常住者應有積聚不應過去唯應有晝不應有夜阿難當知有晝夜想者此是凡小是故阿難求菩薩乘族姓子有深心者為善知識所護不應生晝夜想所以者何求離一切想是菩提道故爾時文殊師利法王子欲重宣此義而説偈言無明名為母能生生死故已拔其根本是故名為害不正觀思惟喜愛名為父彼皆如實知畢竟無所有以知無所有而害其根本不緣無所有是故名為害所説羅漢法及與凡夫法彼已以智壞是故名為害所有衆多相已知其性相以不可壞法壞相名壞僧本來所分別如來諸法想彼已斷遠離知其不生滅此想次第起思量知是空如所説平等彼已能證知所説欲功德其名有五種遠離此諸想知想皆如幻是諸比丘等於欲無增減於導世師前而作如是説知欲性皆空猶如夢所見畢竟無所生於此智得滿以邪智知法虛偽不牢固邪名為虛妄於此智得滿有為法虛妄而無有遠近無知無近遠如五指摩空彼説諸正見皆見是平等如諸法平等知見等亦然凡小多分別衆生想故死若不得衆生亦無有死想有緣諸衆生除其計壽想知計壽過患除其如是想遠離衆生想及與計壽想彼作如是説害多衆生命已遠離死想達無分別法知不壞菩提不增無果報死生不可聚覺了清淨法一切法無諍不生常寂滅不應分別晝亦不分別夜於不來去法而求於菩提凡小恆分別以日用為晝欲求菩提者莫作是分別彼以是密語宣説如是法以知此法故能作如是説文殊師利法王子説此偈已爾時會中百千衆生已拔疑箭無復疑惑逮大照明於諸法中得無生法忍各自脫身所著上服以奉文殊師利法王子皆作是言願使我等於未來世説是妙法覺悟衆生如今文殊師利法王子覺悟衆生爾時世尊告文殊師利言善哉善哉文殊師利除衆生疑照明佛法法應如是爾時阿難白佛言世尊今此百千衆生所有疑箭非是世尊所拔斷耶佛告阿難今此百千衆生皆是文殊師利本所教化成就菩提聞彼説法皆能信解阿難白佛言是諸衆生皆於菩提不退轉耶佛告阿難如是如是是諸衆生已於菩提而不退轉所以者何為文殊師利善知識所護念故爾時阿難白佛言世尊此諸比丘生堅信想生堅法想生八人想生須陀洹想生斯陀含想生阿那含想生阿羅漢想生聲聞想生辟支佛想者皆於菩提不退轉耶佛告阿難是處難信樂小法者懶惰懈怠不勤精進貪著飲食貪著欲染親近樂行欲染法者好喜談説無益之語亂心失念不具威儀心意躁擾不攝諸根輕躁嬉戲愚佷多語如是衆生信是法難阿難著增上慢不能護身貪著身命遠間居處捨多聞法破戒憍慢毀法竊法不尊重法毀滅正法貧窮法財喜樂非法誹謗正法樂行非法不知恩報恩不敬佛法僧阿難如是衆生信是法難慳心堅著惡戒瞋心不解佛法成就惡慧貧窮智慧惡友所護遠離善友不為般若波羅蜜所護不為諸陀羅尼經王所護起有得見深重利養貪著衣鉢於衣鉢物極生重心不尊重和上阿闍梨於初夜後夜不勤行方便阿難如是衆生信是法難殺生偷盜邪淫妄語兩舌惡口説非時語貪瞋邪見親近邪見修行廣布邪方便法無慚無悔朋黨交遊獨行無伴離沙門法行非沙門法不信空無相無作無為不生不滅一切諸法非破壞相阿難當知如是衆生信是法難爾時世尊説是語已即便默然爾時阿難承佛威神問文殊師利法王子言文殊師利世尊何故默無所説文殊師利言將來惡世衆生成就如是惡不善法不能信解如是深法以是事故世尊默然尊者阿難問文殊師利言來世衆生少有信解如是法不文殊師利言來世衆生信此法者甚少猶如衆生不識珍寶者多識者甚少所以者何非其智力所及阿難衆生亦爾聞説此法信解者少設有信解如是法者不為國土城村人民所敬國土人民咸共輕賤而遠離之所以者何此人先世作法留難業因緣故今受此報阿難請文殊師利言惟願為此少信解衆生敷演此義文殊師利言此事問佛佛當演説爾時阿難即便問佛爾時世尊四面顧視即出舌相遍覆三千大千世界於其舌相復放光明遍照十方恆河沙世界皆令周遍時四部衆佛神力故皆見十方恆河沙諸佛世界諸佛世尊皆説是法悉得聞知聞是法已皆共和合勸請世尊唯願如來宣説此法莫令斷絶世尊今十方諸世界中無量無邊不可限量諸佛世尊宣説是法我等悉得見聞其所説法無有增減如今世尊等無有異爾時世尊還攝舌相告阿難言汝頗曾見不實語人有是廣長舌相不耶阿難白佛言無也世尊此是世尊誠實説于戒定忍辱憐愍饒益慈悲喜捨一切智果所得舌相是故世尊唯願為此少信衆生族姓男女敷演此義因是事故諸不信者以此證知皆令得信爾時世尊告阿難言今此四衆諸來會者比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等聞説此法者皆於阿耨多羅三藐三菩提不退轉漸次修行當得阿耨多羅三藐三菩提即於此處宣説是法無有增減如我今日等無有異爾時四衆比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等皆大歡喜踊躍無量其中或有以衣散佛者或以華者或以諸鬘所謂須曼那鬘金鬘銀鬘毗琉璃鬘頗梨鬘車璩鬘馬瑙鬘象瑙鬘日光寶鬘雜七寶鬘以如是等鬘而散佛上諸天以曼陀羅華摩訶曼陀羅華波流沙華摩訶波流沙華曼殊沙華摩訶曼殊沙華迦迦勒羇華摩訶迦迦勒羇華盧遮摩禰華摩訶盧遮摩禰華輸娑摩禰華摩訶輸娑摩禰華如是等諸華而散佛上復以天優鉢羅華波頭摩華拘物頭華分陀利華而散佛上於虛空中作天伎樂種種歌頌讚歎佛德諸龍王等皆雨真珠散於佛上一切女人即脫身上妙好瓔珞以散佛上脫身上服以用奉佛即整衣服右膝著地一心合掌住於佛前皆共和合而作是言諸佛如來言無有二智無障礙記説我等必當作佛爾時世尊告阿難言如是阿難是諸女人必於阿耨多羅三藐三菩提不退轉所以者何諸佛世尊永斷愚癡貪欲瞋恚及諸憍慢塵垢黑暗一切染著燒燃煩惱永盡無餘成就精進成就諸力威德尊嚴神足自在光明照曜眷屬成就尊貴威勢色族姓處皆悉具足相好具足光明具足到安隱處如釋如梵如欲界中尊威儀具足戒行具足觀察具足天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等皆共尊重恭敬讚歎不染世法永捨一切諸有為法成就解脫諸佛之法見聞不虛阿難白佛言世尊云何諸佛世尊聞不虛耶佛告阿難汝不知耶阿難白佛言世尊實所未知唯願説之云何如來聞不虛耶佛告阿難一心善聽吾今解説阿難當知若有衆生已聞今聞當聞釋迦牟尼佛名者是諸衆生皆於阿耨多羅三藐三菩提不退轉所以者何諸佛菩提無虛妄故亦無貪欲及以瞋恚阿難何況今日現於我前能以一華散我上者若有衆生我泥洹後形像舍利能持一華以供養者如是衆生亦於阿耨多羅三藐三菩提不退轉阿難白佛若有畜生聞釋迦牟尼佛名者皆於阿耨多羅三藐三菩提不退轉耶佛告阿難若有畜生聞釋迦牟尼佛名者是諸衆生皆種阿耨多羅三藐三菩提種子因緣所以者何諸佛如來其有聞者聞必不虛是故諸佛如來言無有二阿難譬如尼拘陀樹枝葉茂盛能蔭百人至五百人阿難於意云何其樹種子為大小耶阿難白佛言世尊其子甚小佛告阿難是尼拘陀樹種子雖小得地水火風虛空衆緣故而得生長漸次廣大如是阿難彼諸衆生種菩提種子漸次增長當成阿耨多羅三藐三菩提而不可腐敗不可敗壞所以者何以不住一切法作種子故而不腐敗亦無毀壞爾時阿難白佛言世尊為是諸佛本願之力為是諸佛法應爾耶佛告阿難是我本願若有聞我名者必不退轉阿耨多羅三藐三菩提亦是諸佛法應如是所以者何一切諸佛法皆等故阿難白佛若諸佛法等以何緣故立誓願耶佛告阿難諸佛世尊宣説法時會中諸菩薩摩訶薩聞佛説法即立誓願使我將來成佛説法見聞不虛亦復如是爾時阿難白佛言甚奇世尊成就如此希有之法復以此法利益衆生佛告阿難如是如是如汝所説我為利益諸衆生故遍諸佛土供養諸佛不惜身命捨一切物無有慳吝勤修精進積集難得無所依倚菩提之道於一切法而無所取以攝衆生
