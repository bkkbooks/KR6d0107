  - {type: variant, offset: 8, length: 1048, content: '爾時阿難白佛言：「世尊！一切世間必生疑惑不能解了，如來等正覺，以何緣故說堅信、堅法乃至辟支佛耶？」爾時世尊告阿難言：「阿難當知！若有眾生於先佛所造眾善行，能解如來密語不生疑惑。所以者何？能知如來密語，如幻、如熱時炎、如夢所見、如影、如響。阿難！若如是知密語者不生疑惑。是故阿難！菩薩摩訶薩，於如來等正覺密語應如是知。若有勤行精進不得精進，勤修智慧不得智慧者，不生疑惑。」爾時世尊，欲重宣此義，而說偈言：

      「諸佛導世者，微密語難知；

      為發大莊嚴，無異菩薩說。

      懈怠無智者，不能解密語；

      應當勤精進，為解密語故。

      如幻炎夢見，如電亦如響；

      以言說顯現，如是等諸法。

      如是知諸佛，所說微密語；

      能以如是慧，照淨微密智。

      不應如是知，菩提可宣說；

      應如是覺知，無言說故空。

      空不能知空，空不分別空；

      斷一切分別，顯示如是空。

      虛空無所歸＝取【元】【明】歸【大】，取【元】【明】歸取，亦無有取＝所【元】【明】取【大】，所【元】【明】取所捨；

      以無取捨故，是故知法空。」

      佛告阿難：「若如是知有為法皆悉如夢，而不放逸者，不生疑惑。」說是法時，五億比丘生堅信想者，即從坐起整〔其〕－【三】其【大】，〔－〕【宋】【元】【明】其衣服，偏袒右肩右膝著地，一心合掌皆共和合，住於佛前，而說偈言：

      「今日牟尼尊，除我等疑心；

      得解微密義，以信求菩提。」

      復有五億比丘生堅法想者，從諸比丘聞此偈已，即從坐起，乃至合掌，住於佛前，而說偈言：

      「今蒙菩提照，除我等疑冥；

      得解微密義，堅法求菩提。」

      復有十億比丘生八人想者，從諸比丘聞此偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「先住八地心，今日皆除捨；

      得解微密義，八人求菩提。」

      復有十一億比丘生須陀洹想者，從諸比丘聞此偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「今於佛法中，得斷諸疑網；

      解佛微密語，宣說須陀洹。」

      復有二萬五千比丘生斯陀含想者，從諸比丘聞此偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「我等本深＝染【三】【聖】＊深【大】＊，染【宋】【元】【明】【聖】＊深染著，志樂斯陀含；

      今皆得離著，寂滅無戲論。」

      復有五百億比丘生阿那含想者，從諸比丘聞此偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「今遭救世尊，遠離諸戲論；

      得菩提光照，永拔諸果想。」

      復有三萬五千億得四禪比丘生阿羅漢想者，從諸比丘聞此偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「我已離煩惱，通達無異法；

      知諸乘平等，皆悉如幻法。」

      復有二萬比丘生聲聞想者，從諸比丘聞說偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「離縛牟尼尊，止我等虛說；

      密說聲聞義，我今＝企【宋】今【大】，企【宋】今企皆通達。」

      復有五千比丘生辟支佛想者，從諸比丘聞此偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「我等今現見，辟支佛所行；

      解佛微密義，難思辟支佛。」

      〔復〕－【三】復【大】，〔－〕【宋】【元】【明】復有一萬比丘尼生須陀洹果想，斯陀含果想，阿那含果想，阿羅漢果想者，從諸比丘聞說偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「今知平等法，永斷女身分；

      佛無有異言＝信【宋】言【大】，信【宋】言信，必成人中尊。」

      復有八萬八千優婆塞，生須陀洹果想，斯陀含果想，阿那含果想者，從諸比丘聞此偈已，即從坐起，乃至和合，住於佛前，而說偈言：

      「我等心無垢，如淨毘琉璃；

      為修佛法故，今日當出家。」

      爾時虛空中，有六十億那由他諸天，以天曼陀羅華而散佛上，散已〔住立〕－【三】【聖】住立【大】，〔－〕【宋】【元】【明】【聖】住立，而說偈言：

      「本有諸乘想，亦有諸果想；

      今日悉除捨，必當成菩提。」', 宮: ''}
